<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Sagar Sutaria — Portfolio OG Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    width: 1200px;
    height: 630px;
    background: #0B0E14;
    font-family: 'JetBrains Mono', monospace;
    color: #C8CCD4;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 80px;
  }
  /* Blueprint grid */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(232, 185, 49, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232, 185, 49, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  /* Gold accent bar at top */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 80px;
    width: 160px;
    height: 4px;
    background: linear-gradient(90deg, #E8B931, #D4A52A);
    border-radius: 0 0 2px 2px;
  }
  .name {
    font-family: 'Instrument Serif', serif;
    font-size: 72px;
    color: #E8B931;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: #E2E6ED;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 20px;
    color: #7A8191;
    margin-bottom: 48px;
  }
  .stats {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    color: #9BA1B0;
  }
  .stat .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #E8B931;
    opacity: 0.6;
  }
  .stat .value {
    color: #E2E6ED;
    font-weight: 700;
  }
  .former {
    font-size: 15px;
    color: #5A6170;
    letter-spacing: 1px;
  }
  /* Corner accents */
  .corner {
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: rgba(232, 185, 49, 0.15);
    border-style: solid;
  }
  .corner.tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="name">Sagar Sutaria</div>
  <div class="role">Engineering Leader</div>
  <div class="subtitle">Distributed Systems & AI Platforms</div>

  <div class="stats">
    <div class="stat"><span class="dot"></span><span class="value">7</span> Production Platforms</div>
    <div class="stat"><span class="dot"></span><span class="value">50k+</span> Connections</div>
    <div class="stat"><span class="dot"></span><span class="value">13+</span> Years</div>
  </div>

  <div class="former">Ex-Tesco &nbsp;•&nbsp; Ex-Lowe's</div>
</body>
</html>
